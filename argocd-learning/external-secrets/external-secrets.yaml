# ==============================================================================
# EXTERNAL SECRETS OPERATOR (ESO)
#
# PURPOSE: Syncs secrets from AWS Secrets Manager → Kubernetes Secrets.
#          Pods reference Kubernetes Secrets → never need AWS SDK to read secrets.
#
# WHY ESO instead of pods reading Secrets Manager directly?
#   - Simpler: Spring Boot reads env vars, doesn't need AWS SDK integration
#   - Automatic rotation: ESO refreshes k8s secret when source changes
#   - Consistent: all secrets in one place (k8s secrets), regardless of source
#
# INSTALL ESO via Helm (run this manually once after EKS is ready):
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets \
#     -n external-secrets-system \
#     --create-namespace
#
# Or let ArgoCD install it (create an Application pointing to the helm chart).
# ==============================================================================

---
# ==============================================================================
# SECRET STORE — Tells ESO WHERE to find secrets (AWS Secrets Manager)
#
# A ClusterSecretStore is cluster-wide. A SecretStore is namespace-scoped.
# We use ClusterSecretStore so all namespaces can use this store.
#
# AUTHENTICATION: Uses IRSA (IAM role for the ESO ServiceAccount).
# The ESO pod's ServiceAccount is annotated with an IAM role that has
# secretsmanager:GetSecretValue permission.
# ==============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-southeast-1
      # auth: Uses IRSA — ESO pod assumes this IAM role automatically
      # The role must have: secretsmanager:GetSecretValue on your secrets
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets-system

---
# ==============================================================================
# EXTERNAL SECRET — DB Credentials
#
# This pulls "ecommerce/prod/db-credentials" from AWS Secrets Manager
# and creates a Kubernetes Secret named "ecommerce-db-credentials".
#
# Pods then reference it as:
#   env:
#     - name: SPRING_DATASOURCE_PASSWORD
#       valueFrom:
#         secretKeyRef:
#           name: ecommerce-db-credentials
#           key: password
# ==============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ecommerce-db-credentials
  namespace: default
  annotations:
    # sync-wave 0: Create secrets BEFORE deployments (wave 1)
    argocd.argoproj.io/sync-wave: "0"
spec:
  # How often to check for secret updates in AWS Secrets Manager
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    # The Kubernetes Secret that will be created/updated
    name: ecommerce-db-credentials
    creationPolicy: Owner

  data:
    # Extract individual keys from the JSON secret
    - secretKey: username  # key in Kubernetes Secret
      remoteRef:
        key: ecommerce/prod/db-credentials  # path in Secrets Manager
        property: username                   # field in the JSON value

    - secretKey: password
      remoteRef:
        key: ecommerce/prod/db-credentials
        property: password

    - secretKey: host
      remoteRef:
        key: ecommerce/prod/db-credentials
        property: host

---
# ==============================================================================
# EXTERNAL SECRET — JWT Secret
# ==============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ecommerce-jwt-secret
  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: ecommerce-jwt-secret
    creationPolicy: Owner
  data:
    - secretKey: jwt_secret
      remoteRef:
        key: ecommerce/prod/jwt-secret
        property: jwt_secret
