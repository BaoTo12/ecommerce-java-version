# CI PIPELINE — Continuous Integration
# TRIGGER: Any push to main/develop that changes microservice or shared code.
#          Also runs on pull requests to main (but skips the deploy jobs).
#
# TWO JOBS:
#   Job 1 (build-and-push): Compiles, tests, builds Docker image, pushes to ECR
#   Job 2 (update-helm-tag): Updates charts/values/<service>.yaml with new image tag
#                             → This commit triggers ArgoCD to deploy
#
# FULL GITOPS LOOP:
#   Code push → CI builds image → CI commits new tag → ArgoCD detects → Deploys to EKS
#
# ! REQUIRED GITHUB SECRETS:
#   AWS_ROLE_ARN  — IAM role for OIDC authentication (no access keys needed!)
#   GH_PAT        — GitHub Personal Access Token (for the commit-back in Job 2)

name: CI — Build, Test, Push & Update Helm

on:
  push:
    branches: [main, develop]
    paths:
      - "order-service/**"
      - "payment-service/**"
      - "inventory-service/**"
      - "notification-service/**"
      - "user-service/**"
      - "shared-events/**"
      - "shared-security/**"
      - "pom.xml"
      - ".github/workflows/ci.yaml"

  pull_request:
    branches: [main]
    # PRs also trigger this workflow — but Job 2 (deploy) is gated by:
    #   if: github.ref == 'refs/heads/main' && github.event_name == 'push' --> So PRs only run Job 1 (build + test)

env:
  AWS_REGION: ap-southeast-1
  JAVA_VERSION: "21"

# Permissions for OIDC auth — GitHub needs to request an OIDC token from GitHub
# id-token: write  → allows requesting OIDC JWT from GitHub
# contents: write  → allows committing the updated Helm values back to repo
permissions:
  id-token: write
  contents: write

jobs:
  # JOB 1: Build, Test, Push Docker Image
  #
  # WHY matrix strategy?
  # Instead of copy-pasting the same job 5 times (once per service),
  # we define it once and GitHub runs it in PARALLEL for each service.
  # 5 services → 5 parallel jobs → pipeline is ~5x faster than sequential.
  build-and-push:
    name: "Build & Push — ${{ matrix.service }}"
    runs-on: ubuntu-latest

    strategy:
      # fail-fast: false means if order-service build fails, payment-service
      # still continues. Without this, one failure cancels all parallel jobs.
      fail-fast: false
      matrix:
        service:
          - order-service
          - payment-service
          - inventory-service
          - notification-service
          - user-service

    outputs:
      # The image tag generated in this job — used by Job 2 to update Helm values.
      # Note: with matrix, all jobs write the same tag (built from git SHA, same for all).
      image-tag: ${{ steps.meta.outputs.image-tag }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4 # 👉 Clone repo về runner

      # ── Step 2: Determine which services actually changed ─────────────────
      # This avoids rebuilding order-service when only payment-service changed.
      # paths-filter returns true/false per service.
      - name: Detect changed services
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            changed:
              - '${{ matrix.service }}/**'
              - 'shared-events/**'
              - 'shared-security/**'
              - 'pom.xml'

      # ── Step 3: Generate image tag ────────────────────────────────────────
      # WHY use git SHA instead of "latest"?
      - name: Generate image tag
        id: meta
        if: steps.filter.outputs.changed == 'true'
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BRANCH=$(echo "${{ github.ref_name }}" | tr '/' '-')
          IMAGE_TAG="${BRANCH}-${SHORT_SHA}"
          echo "image-tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "Generated image tag: ${IMAGE_TAG}"

      # ── Step 4: Set up Java ───────────────────────────────────────────────
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        if: steps.filter.outputs.changed == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"
          # Cache Maven dependencies between runs — significantly faster builds
          cache: maven

      # ── Step 5: Run tests ─────────────────────────────────────────────────
      - name: Run unit tests
        if: steps.filter.outputs.changed == 'true'
        run: |
          # -pl: only build the changed service module
          # -am: also build modules it depends on (shared-events, shared-security)
          # -Dsurefire.failIfNoSpecifiedTests=false: don't fail if no tests found
          mvn test -pl ${{ matrix.service }} -am \
            --no-transfer-progress \
            -Dsurefire.failIfNoSpecifiedTests=false

      # ── Step 6: Build JAR ─────────────────────────────────────────────────
      - name: Build JAR with Maven
        if: steps.filter.outputs.changed == 'true'
        run: |
          mvn package -pl ${{ matrix.service }} -am \
            --no-transfer-progress \
            -DskipTests

      # ── Step 7: AWS Authentication (OIDC — no access keys!) ──────────────
      # GitHub generates a short-lived JWT token → AWS STS validates it →
      # returns temporary credentials. No long-lived secrets stored anywhere.
      # See README.md for the full OIDC flow diagram.
      - name: Configure AWS credentials via OIDC
        if: steps.filter.outputs.changed == 'true'
        uses: aws-actions/configure-aws-credentials@v4 # 👉 GitHub → OIDC token → AWS STS → temporary credentials
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Step 8: Login to ECR ──────────────────────────────────────────────
      - name: Login to Amazon ECR
        if: steps.filter.outputs.changed == 'true'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Step 9: Build & Push Docker image ─────────────────────────────────
      - name: Build and push Docker image
        if: steps.filter.outputs.changed == 'true'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ matrix.service }}
          IMAGE_TAG: ${{ steps.meta.outputs.image-tag }}
        run: |
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"

          docker build \
            --tag "${IMAGE_URI}" \
            --file "${{ matrix.service }}/Dockerfile" \
            --build-arg JAR_FILE="${{ matrix.service }}/target/*.jar" \
            .

          docker push "${IMAGE_URI}"
          echo "Successfully pushed: ${IMAGE_URI}"

          # Save for summary
          echo "### Image Pushed 🚀" >> $GITHUB_STEP_SUMMARY
          echo "\`${IMAGE_URI}\`" >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # JOB 2: Update Helm Values → Triggers ArgoCD
  #
  # WHY a separate job?
  # 1. Only runs on main branch pushes (not PRs) — prevents deploying un-reviewed code
  # 2. Depends on Job 1 success — if build fails, we never touch deployment config
  # 3. Separation of concerns: CI (build) ≠ CD trigger (update git)
  #
  # HOW this triggers ArgoCD:
  # This job commits updated image tags to charts/values/<service>.yaml
  # ArgoCD watches this repo. When it detects a git change, it syncs k8s state.
  # This is the "Push-based GitOps" pattern.
