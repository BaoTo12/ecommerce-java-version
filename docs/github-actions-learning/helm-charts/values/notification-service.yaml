image:
  repository: "123456789012.dkr.ecr.ap-southeast-1.amazonaws.com/notification-service"
  tag: "main-a1b2c3d"

service:
  port: 8085

serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/ecommerce-notification-service-role"

env:
  - name: SERVER_PORT
    value: "8085"
  - name: SPRING_DATASOURCE_URL
    value: "jdbc:postgresql://ecommerce-notification-service-db-prod.xxxx.ap-southeast-1.rds.amazonaws.com:5432/notificationdb"
  - name: SPRING_DATASOURCE_USERNAME
    valueFrom:
      secretKeyRef:
        name: ecommerce-db-credentials
        key: username
  - name: SPRING_DATASOURCE_PASSWORD
    valueFrom:
      secretKeyRef:
        name: ecommerce-db-credentials
        key: password
  - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
    value: "b-1.ecommerce-msk.xxxx.kafka.ap-southeast-1.amazonaws.com:9092,b-2.xxxx:9092"
  - name: SPRING_PROFILES_ACTIVE
    value: "prod"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
