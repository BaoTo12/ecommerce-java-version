{{- if .Values.autoscaling.enabled }}
# ==============================================================================
# HPA — HorizontalPodAutoscaler
#
# Automatically scales pods up/down based on CPU or memory utilization.
#
# EXAMPLE: order-service during Black Friday sale
#   Normal:      2 pods, CPU 30%
#   Sale starts: CPU spikes to 85% → HPA adds pods → 3 pods, CPU 55%
#   More traffic: CPU 80% → 4 pods, CPU 45%
#   Sale ends:   CPU drops → HPA removes pods over 5 min stabilization window
#
# WHY remove replicas: from Deployment when HPA is enabled?
# If BOTH Deployment.spec.replicas AND HPA are set, they conflict.
# HPA tries to set replicas → Deployment helm upgrade resets it.
# Solution: deployment.yaml conditionally skips replicas when autoscaling.enabled=true
# ==============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "microservice.fullname" . }}
  labels:
    {{- include "microservice.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "microservice.fullname" . }}
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
{{- end }}
