apiVersion: v2
name: microservice
description: |
  A reusable Helm chart for all ecommerce microservices.
  One chart + different values files = DRY principle.
  Each service (order, payment, inventory, etc.) uses this same chart
  but with its own values file in charts/values/<service>.yaml.
type: application
version: 0.1.0
appVersion: "1.0.0"
