# ==============================================================================
# APP-OF-APPS — Root Application
#
# This is the single Application you create MANUALLY (once).
# After this, ArgoCD manages everything else — even the other Applications.
#
# HOW TO BOOTSTRAP:
#   kubectl apply -f argocd-learning/applications/app-of-apps.yaml
#
# After applying this, ArgoCD will find all the other .yaml files in
# the applications/ directory and create them automatically.
#
# WHY App-of-Apps?
# See CONCEPTS.md Concept 3. Short: you only `kubectl apply` once,
# then Git manages everything (true GitOps).
# ==============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ecommerce-root
  namespace: argocd

  # finalizer: When you delete this Application, ArgoCD also deletes all
  # child Applications AND all resources they created. This is "cascade delete".
  # Remove this finalizer if you want to delete the root app while keeping children.
  finalizers:
    - resources-finalizer.argocd.argoproj.io

spec:
  project: default

  source:
    repoURL: https://github.com/BaoTo12/ecommerce-java-version.git
    # Track HEAD of main branch. In production, consider tracking a specific tag.
    targetRevision: HEAD
    # This folder contains all the child Application manifests
    path: argocd-learning/applications

  destination:
    server: https://kubernetes.default.svc
    # Applications go in the argocd namespace (that's where ArgoCD lives)
    namespace: argocd

  syncPolicy:
    automated:
      prune: true     # Delete Applications removed from git
      selfHeal: true  # Revert manual changes to Applications
    syncOptions:
      - CreateNamespace=true
