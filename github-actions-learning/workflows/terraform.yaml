# ==============================================================================
# TERRAFORM PIPELINE — Infrastructure Changes
#
# WHY a SEPARATE pipeline for Terraform?
# Application code and infrastructure have VERY different risk profiles:
#
#   App code: If deploy fails → rollback in seconds via ArgoCD
#   Terraform: If apply fails → could delete a database, corrupt state,
#              create orphaned resources that cost money
#
# This pipeline adds a HUMAN REVIEW GATE before any Terraform apply.
# A plan is posted as a PR comment → someone reviews → merges → apply runs.
#
# WORKFLOW:
#   PR opened → fmt + validate + plan (results shown in PR comment)
#   PR merged → apply (creates/modifies/destroys actual AWS resources)
#
# REQUIRED SECRETS:
#   AWS_ROLE_ARN — same OIDC role as CI, but needs Terraform permissions
#                  (AdministratorAccess or a custom policy for all resources)
# ==============================================================================

name: Terraform — Infrastructure

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yaml"

  pull_request:
    branches: [main]
    paths:
      - "terraform/**"

env:
  AWS_REGION: ap-southeast-1
  # Terraform version — pin to match required_version in backend.tf
  TF_VERSION: "1.8.5"
  TF_WORKING_DIR: terraform/infrastructure/prod

permissions:
  id-token: write
  contents: read
  # Allow posting plan output as a PR comment
  pull-requests: write

jobs:
  terraform:
    name: Terraform ${{ github.event_name == 'pull_request' && 'Plan' || 'Apply' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── AWS Authentication ─────────────────────────────────────────────────
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Setup Terraform ────────────────────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # ── Format Check ──────────────────────────────────────────────────────
      # terraform fmt --check validates that code is properly formatted.
      # Fails if formatting is wrong, enforcing consistent style across team.
      - name: Terraform Format Check
        run: terraform fmt --check --recursive
        working-directory: ${{ env.TF_WORKING_DIR }}

      # ── Init ──────────────────────────────────────────────────────────────
      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          # Pass sensitive backend config via env vars (not hardcoded)
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}

      # ── Validate ──────────────────────────────────────────────────────────
      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}

      # ── Plan ──────────────────────────────────────────────────────────────
      # Plan shows what Terraform WILL DO before doing it.
      # Output is saved to a file and posted as a PR comment.
      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -out=tfplan \
            -no-color \
            -input=false 2>&1 | tee plan_output.txt
          echo "plan-exit-code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
        continue-on-error: true  # Don't fail immediately — we want to post the plan output

      # ── Post Plan to PR ───────────────────────────────────────────────────
      # The plan output is posted as a comment on the PR so reviewers can
      # see exactly what infrastructure changes will happen before approving.
      - name: Post Plan as PR Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_WORKING_DIR }}/plan_output.txt', 'utf8');
            const maxLength = 65000; // GitHub comment limit
            const truncated = plan.length > maxLength
              ? plan.substring(0, maxLength) + '\n... (truncated)'
              : plan;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan Output\n\`\`\`hcl\n${truncated}\n\`\`\``
            });

      # ── Apply (ONLY on merge to main) ─────────────────────────────────────
      # NEVER apply on PR — only after human review and merge.
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve tfplan
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
