apiVersion: v1
kind: Service
metadata:
  name: {{ include "microservice.fullname" . }}
  labels:
    {{- include "microservice.labels" . | nindent 4 }}
spec:
  # ClusterIP: internal-only service (default)
  # Pods communicate with each other via: http://<service-name>:<port>
  # External traffic comes in via Ingress → routed to this ClusterIP service
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http   # References the named port in the Deployment
      protocol: TCP
      name: http
  selector:
    # Traffic is sent only to pods matching these labels
    {{- include "microservice.selectorLabels" . | nindent 4 }}
