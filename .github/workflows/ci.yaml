name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'order-service/**'
      - 'payment-service/**'
      - 'inventory-service/**'
      - 'notification-service/**'
      - 'user-service/**'
      - 'shared-events/**'
      - 'shared-security/**'
      - 'pom.xml'
      - '.github/workflows/ci.yaml'
  pull_request:
    branches: [ main ]

env:
  AWS_REGION: ap-southeast-1

permissions:
  id-token: write
  contents: write

jobs:
  # ──────────────────────────────────────────
  # JOB 1: Build, Test, Push Docker image
  # ──────────────────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [order-service, payment-service, inventory-service, notification-service, user-service]
    outputs:
      image-tag: ${{ steps.meta.outputs.image-tag }}
      
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # Generate image tag từ short SHA
      - name: Generate image metadata
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          BRANCH=$(echo ${{ github.ref_name }} | tr '/' '-')
          IMAGE_TAG="${BRANCH}-${SHORT_SHA}"
          echo "image-tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "Generated tag: ${IMAGE_TAG}"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Configure AWS credentials (dùng OIDC)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Login ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Build và push
      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ matrix.service }}
          IMAGE_TAG: ${{ steps.meta.outputs.image-tag }}
        run: |
          # Build package with Maven
          mvn clean package -pl ${{ matrix.service }} -am -DskipTests
          
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          
          # Build với cache từ latest để tăng tốc
          docker build \
            --cache-from "${ECR_REGISTRY}/${ECR_REPOSITORY}:cache" \
            --tag "${IMAGE_URI}" \
            --tag "${ECR_REGISTRY}/${ECR_REPOSITORY}:cache" \
            -f ${{ matrix.service }}/Dockerfile .
          
          docker push "${IMAGE_URI}"
          docker push "${ECR_REGISTRY}/${ECR_REPOSITORY}:cache"
          
          echo "Pushed: ${IMAGE_URI}"

  # ──────────────────────────────────────────
  # JOB 2: Update Helm values → trigger ArgoCD
  # ──────────────────────────────────────────
  update-helm-tag:
    name: Update Helm image tag
    runs-on: ubuntu-latest
    needs: build-and-push
    # Chỉ update Helm tag trên main (không phải PR)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Install yq (YAML processor)
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq

      # Cập nhật image tag trong values.yaml cho tất cả services
      - name: Update image tag in Helm values
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
        run: |
          # Lấy ECR registry URL
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          
          SERVICES="order-service payment-service inventory-service notification-service user-service"
          
          for SERVICE in $SERVICES; do
            VALUES_FILE="charts/values/${SERVICE}.yaml"
            if [ -f "$VALUES_FILE" ]; then
              echo "Updating $VALUES_FILE"
              yq e ".image.tag = \"${IMAGE_TAG}\"" -i "$VALUES_FILE"
              yq e ".image.repository = \"${ECR_REGISTRY}/${SERVICE}\"" -i "$VALUES_FILE"
            else
              echo "Warning: $VALUES_FILE not found, skipping."
            fi
          done
          
          echo "Updated values files:"
          ls charts/values/*.yaml

      # Commit & push — đây là "trigger" cho ArgoCD
      - name: Commit and push updated Helm values
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add charts/values/*.yaml
          
          # Chỉ commit nếu có thay đổi thực sự
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "ci: update image tag to ${IMAGE_TAG} [skip ci]"
          git push origin main
