apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: order-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_GITHUB_USERNAME/ecommerce-java-version.git
    targetRevision: HEAD
    path: charts/microservice
    helm:
      values: |
        image:
          repository: 123456789012.dkr.ecr.us-east-1.amazonaws.com/order-service
          tag: latest
        env:
          - name: SPRING_DATASOURCE_URL
            value: "jdbc:postgresql://YOUR_RDS_ENDPOINT:5432/ecommerce"
          - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
            value: "YOUR_MSK_BOOTSTRAP_SERVERS"
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
