apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-config
  namespace: argocd
  finalizers:
    - resources-finalizer-argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/BaoTo12/ecommerce-java-version.git
    targetRevision: HEAD
    path: argocd/external-secrets  # Point to your secret instructions
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
